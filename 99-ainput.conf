# Example Xorg/XLibre configuration for AnbryInput.
#
# Copy this file to /etc/X11/xorg.conf.d/99-ainput.conf and replace the
# placeholder device names with names from `xinput list`.
#
# Keep matches as specific as possible. Broad pointer matches can accidentally
# catch touchpads, tablets, or extra HID interfaces from gaming mice.

Section "InputClass"
    Identifier "AnbryInput Mouse"
    MatchProduct "YOUR_MOUSE_NAME_HERE"
    MatchIsPointer "on"
    MatchDevicePath "/dev/input/event*"
    Driver "ainput"

    Option "Type" "mouse"
    Option "Sensitivity" "1.0"
    Option "DPI" "1000"
    Option "ReferenceDPI" "1000"
EndSection

Section "InputClass"
    Identifier "AnbryInput Keyboard"
    MatchProduct "YOUR_KEYBOARD_NAME_HERE"
    MatchIsKeyboard "on"
    MatchDevicePath "/dev/input/event*"
    Driver "ainput"

    Option "Type" "keyboard"
    Option "xkb_layout" "us"
EndSection
